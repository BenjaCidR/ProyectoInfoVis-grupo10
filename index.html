<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impacto de la Localía - Visualización</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .grafico-img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 20px 0;
        }
        .analisis {
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Impacto de la Localía: Real Madrid vs FC Barcelona</h1>
        
        <img src="img/grafico_localia.png" alt="Gráfico de Evolución de Goles de Local" class="grafico-img">
        
        <div class="analisis">
            <h3>Nota de autor:</h3>
            <p>
                Mediante la visualización, es evidente que FC Barcelona es quien predomina el número de goles de local. Mientras que Real Madrid sólo lo supera a su archirival en dos ocaciones.
            </p>
        </div>
    </div>

</body>
</html>
