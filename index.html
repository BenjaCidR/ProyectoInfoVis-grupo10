<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impacto de la Localía - Visualización</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ── Sidebar emergente (izquierda = RM, derecha = FCB vía JS) ─────── -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 id="panel-title">Detalle de temporada</h3>
            <button class="close-btn" id="close-btn">✕</button>
        </div>
        <div class="sidebar-content">
            <div class="stats-card" id="stats-container">
                <p>Haz clic en un punto del gráfico para ver el detalle.</p>
            </div>
            <div class="chart-container-small">
                <canvas id="detailChart"></canvas>
            </div>
        </div>
    </div>

    <!-- ── Contenido principal ──────────────────────────────────────────── -->
    <div class="main-content" id="main-content">
        <header>
            <h1>Impacto de la Localía</h1>
            <p>Real Madrid vs FC Barcelona · LaLiga 2016–2022</p>
            <p>Haz clic en cualquier punto de los gráficos para ver el detalle de esa temporada.</p>
        </header>

        <div class="charts-wrapper">

            <!-- Gráfico Real Madrid — sidebar abre a la izquierda -->
            <div class="chart-box">
                <h3>⚽ Real Madrid</h3>
                <div class="canvas-wrapper">
                    <canvas id="chartRM"></canvas>
                </div>
            </div>

            <!-- Gráfico FC Barcelona — sidebar abre a la derecha -->
            <div class="chart-box">
                <h3>⚽ FC Barcelona</h3>
                <div class="canvas-wrapper">
                    <canvas id="chartFCB"></canvas>
                </div>
            </div>

        </div>
    </div>

    <!-- Chart.js debe ir antes que app.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js" defer></script>

</body>
</html>
